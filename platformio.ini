
; ============================================================
;  Общие настройки платы
; ============================================================
[base]
platform  = espressif32
board     = lolin_c3_mini
board_build.mcu = esp32c3
framework = arduino
board_build.f_cpu        = 80000000L
board_build.filesystem   = littlefs
upload_speed             = 921600
monitor_speed            = 115200
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson  @ ^7.0.0
    gyverlibs/Settings     @ ^1.3.0
    GyverLibs/StringUtils
    GyverLibs/Pairs
    GyverLibs/GSON
    GyverLibs/Settings
    links2004/WebSockets   @ ^2.4.0
    gyverlibs/WiFiConnector @ ^1.0.0
    pololu/VL53L1X         @ ^1.0.1

; ============================================================
;  1. Полная прошивка: MQTT + VL53L1X
; ============================================================
[env:full]
extends = base
build_flags =
    ${base.build_flags}
    -D USE_MQTT
    -D USE_VL53

; ============================================================
;  2. Без MQTT / Home Assistant, только сенсоры + веб
; ============================================================
[env:no_mqtt]
extends = base
build_flags =
    ${base.build_flags}
    -D USE_VL53

; ============================================================
;  3. Только LD2410C + логика двери (минимум)
; ============================================================
[env:minimal]
extends = base
build_flags =
    ${base.build_flags}
